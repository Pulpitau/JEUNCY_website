<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jeuncy, la plateforme de recrutement pour alternants, saisonniers et benevoles. Ton alternance commence ici."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Jeuncy</title>
    <script>
      // Applique le theme persiste avant le premier rendu, pour eviter un flash.
      try {
        var stored = JSON.parse(localStorage.getItem('jeuncy-theme'));
        var theme = stored && stored.state && stored.state.theme;
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
